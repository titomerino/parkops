<!-- QR SCANNER COMPONENT -->
<div id="qrScannerComponent">

  <!-- Botón opcional -->
  <button
    type="button"
    class="btn btn-outline-light w-100 rounded-pill d-flex align-items-center justify-content-center gap-2"
    onclick="QrScanner.toggle()"
  >
    <i class="bi bi-qr-code-scan"></i>
    Escanear ticket
  </button>

  <!-- Scanner -->
  <div id="qrScannerWrapper" class="mt-3" style="display:none;">
    
    <div id="qr-reader"
         class="rounded-4 overflow-hidden border border-secondary">
    </div>

    <div id="qrScannerStatus"
         class="text-center small text-muted mt-2">
    </div>

  </div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const QrScanner = (function () {

    let scanner = null;
    let active = false;

    function initScanner() {
        scanner = new Html5Qrcode("qr-reader");
    }

    function toggle() {
        const wrapper = document.getElementById("qrScannerWrapper");
        const status = document.getElementById("qrScannerStatus");

        if (!active) {
            wrapper.style.display = "block";
            status.innerText = "Activando cámara...";

            if (!scanner) initScanner();

            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                onScanSuccess
            );

            active = true;
        } else {
            stop();
        }
    }

    function onScanSuccess(decodedText) {

        const status = document.getElementById("qrScannerStatus");
        status.innerText = "QR detectado ✔";

        stop();

        let entryId = null;

        console.log("QR RAW:", decodedText);
    alert(decodedText);

        if (decodedText.includes("entry_id=")) {
            entryId = decodedText.split("entry_id=")[1];
        }

        if (entryId) {
            window.location.href = `/parking/salida/${entryId}`;
            return;
        }

        alert("QR inválido");
    }

    function stop() {
        const wrapper = document.getElementById("qrScannerWrapper");

        if (scanner && active) {
            scanner.stop().then(() => {
                wrapper.style.display = "none";
                active = false;
            });
        } else {
            wrapper.style.display = "none";
            active = false;
        }
    }

    return {
        toggle,
        stop
    };

})();
</script>
